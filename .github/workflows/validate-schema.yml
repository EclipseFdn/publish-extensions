name: Validate Extension Control Schema

on:
  push:
    branches: [master]
    paths:
      - 'extension-control/extensions.json'
      - 'extension-control/schema.json'
  pull_request:
    branches: [master]
    paths:
      - 'extension-control/extensions.json'
      - 'extension-control/schema.json'

permissions:
  contents: read

jobs:
  validate:
    name: Validate extensions.json against schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.x"
      
      - name: Install ajv-cli
        run: npm install -g ajv-cli
      
      - name: Validate JSON schema
        run: ajv validate -s extension-control/schema.json -d extension-control/extensions.json --strict=false
