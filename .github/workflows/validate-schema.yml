name: Validate Extension Control Schema

on:
  push:
    branches: [master]
    paths:
      - 'extension-control/extensions.json'
      - 'extension-control/schema.json'
  pull_request:
    branches: [master]
    paths:
      - 'extension-control/extensions.json'
      - 'extension-control/schema.json'

permissions:
  contents: read

jobs:
  validate:
    name: Validate extensions.json against schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
      
      - name: Install ajv-cli
        run: npm install -g ajv-cli
      
      - name: Validate JSON schema
        run: ajv validate -s extension-control/schema.json -d extension-control/extensions.json --strict=false
